version: '3.8'

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  db:
    image: postgres:15-alpine
    container_name: crypto_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypto_network

  # ===========================================
  # Redis (Celery Broker)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: crypto_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypto_network

  # ===========================================
  # FastAPI Application
  # ===========================================
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: crypto_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - APP_HOST=${APP_HOST}
      - APP_PORT=${APP_PORT}
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python -m app.db.migrate &&
             uvicorn app.main:app --host ${APP_HOST} --port ${APP_PORT}"
    networks:
      - crypto_network
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic

  # ===========================================
  # Celery Worker + Beat (Scheduler)
  # ===========================================
  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: crypto_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "celery -A app.workers.celery_app worker --loglevel=${APP_LOG_LEVEL} 
             & celery -A app.workers.celery_app beat --loglevel=${APP_LOG_LEVEL}"
    networks:
      - crypto_network
    volumes:
      - ./app:/app/app

volumes:
  postgres_data:
    driver: local

networks:
  crypto_network:
    driver: bridge