services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  db:
    image: postgres:18.3-alpine
    container_name: crypto_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    # volumes:
    #   - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crypto_network

volumes:
  postgres_data:
    driver: local

networks:
  crypto_network:
    driver: bridge